services:
  - type: web
    name: enquiry-management
    env: node
    region: oregon
    buildCommand: "npm install && npm run build && cd backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/database.sqlite
      - key: CORS_ORIGIN
        value: "*"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
