services:
  - type: web
    name: enquiry-management
    env: node
    plan: free
    region: oregon
    buildCommand: "npm install --include=dev && npm run build && cd backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
